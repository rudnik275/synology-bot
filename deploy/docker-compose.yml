services:
  bot:
    image: rudnik275/synology-bot:latest
    container_name: synology-bot
    restart: unless-stopped
    env_file: /volume1/docker/synology-bot/.env
    # Bind the Hono server on the compose bridge (not just loopback) so the
    # sibling cloudflared container can reach it as `http://bot:8080` (ADR 0010).
    # The port is NOT published to the host (`ports:` is intentionally absent),
    # so it stays reachable only from other containers on this network — the
    # zero-open-ports / owner-only posture from ADR 0005/0001 is preserved.
    environment:
      MINIAPP_HOST: "0.0.0.0"
      # Pin the process timezone so the daily digest fires at local (Kyiv)
      # time, not container-default UTC (#295).
      TZ: "Europe/Kyiv"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /volume1/docker/synology-bot/data:/usr/src/app/data
  # Cloudflare Tunnel — exposes the Mini App over public HTTPS for Telegram's
  # webview without opening any inbound port (ADR 0005, infra slice #59).
  #
  # The tunnel runs on the shared compose network (NOT in the bot's netns) and
  # reaches the Hono server by service name at `http://bot:${MINIAPP_PORT}`
  # (ADR 0010, superseding 0007). Route the public hostname to `http://bot:8080`
  # in the Cloudflare dashboard. TUNNEL_TOKEN is interpolated from CF_TUNNEL_TOKEN
  # in the same-directory .env.
  #
  # Because cloudflared no longer shares the bot's netns, recreating the bot (on
  # every Watchtower image update) no longer tears the tunnel down — cloudflared
  # stays connected across deploys, so the prior `depends-on=synology-bot`
  # Watchtower workaround is gone. `enable=true` still keeps cloudflared updated.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: synology-cloudflared
    restart: unless-stopped
    depends_on:
      - bot
    command: tunnel run
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Bot self-reports deploys via image SHA diff on each boot — no shoutrrr
      # URL needed here. See src/domain/deploy-reporter.ts.
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
