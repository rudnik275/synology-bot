services:
  bot:
    image: rudnik275/synology-bot:latest
    container_name: synology-bot
    restart: unless-stopped
    env_file: /volume1/docker/synology-bot/.env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /volume1/docker/synology-bot/data:/usr/src/app/data
  # Cloudflare Tunnel — exposes the Mini App over public HTTPS for Telegram's
  # webview without opening any inbound port (ADR 0005, infra slice #59).
  # `network_mode: service:bot` shares the bot's network namespace, so the tunnel
  # reaches the Hono server on its loopback `localhost:${MINIAPP_PORT}` (the server
  # binds 127.0.0.1 — see src/app.ts). Route the public hostname to
  # `http://localhost:8080` in the Cloudflare dashboard. TUNNEL_TOKEN is
  # interpolated from CF_TUNNEL_TOKEN in the same-directory .env.
  #
  # Watchtower labels: because cloudflared shares the bot's network namespace,
  # recreating the bot (on every image update) tears down cloudflared's netns and
  # the tunnel goes Down. `depends-on=synology-bot` makes Watchtower recreate
  # cloudflared right after it updates the bot, so the tunnel auto-recovers on
  # every deploy; `enable=true` puts cloudflared in Watchtower's monitored set.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: synology-cloudflared
    restart: unless-stopped
    network_mode: "service:bot"
    depends_on:
      - bot
    command: tunnel run
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.depends-on=synology-bot"
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Bot self-reports deploys via image SHA diff on each boot — no shoutrrr
      # URL needed here. See src/domain/deploy-reporter.ts.
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
